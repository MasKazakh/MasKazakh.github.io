<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasKazakh | System Override</title>
    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg-color: #050505;
            --matrix-green: #00FF41;
            --fire-red: #ff4500;
            --fire-yellow: #ffd700; 
            --grid-size: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--matrix-green);
            font-family: 'VT323', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            position: relative;
        }



        .fire-background {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%; 
            background: linear-gradient(to top, 
                var(--fire-red) 0%, 
                var(--fire-yellow) 40%, 
                transparent 80%);
            opacity: 0.6;
            z-index: -2;
            animation: firePulse 3s infinite alternate;
        }

        @keyframes firePulse {
            0% { height: 55%; opacity: 0.5; }
            100% { height: 65%; opacity: 0.7; }
        }

        .pixel-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            background-image: 
                linear-gradient(var(--bg-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: -1;

            background-color: rgba(5, 5, 5, 0.85); 
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 80px 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 6rem;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 10px;
            position: relative;
            
            color: var(--matrix-green);
            text-shadow: 
                4px 4px 0px #003300,
                0 0 20px var(--matrix-green);
            

            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(0deg); }
            21% { transform: skew(-10deg); text-shadow: -2px 0 red; }
            22% { transform: skew(10deg); text-shadow: 2px 0 blue; }
            23% { transform: skew(0deg); text-shadow: 4px 4px 0px #003300; }
            100% { transform: skew(0deg); }
        }

        .tagline {
            font-size: 1.8rem;
            color: #ccc;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        ul {
            list-style: none;
            text-align: left;
            border-top: 2px solid #333;
            background: rgba(0, 0, 0, 0.6);
        }

        li {
            border-bottom: 2px solid #333;
        }

        a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--matrix-green);
            padding: 25px 10px;
            font-size: 1.5rem;
            transition: 0.2s;
        }

        a:hover {
            background-color: var(--matrix-green);
            color: #000;
            cursor: pointer;
        }

        a .arrow {
            opacity: 0;
        }
        a:hover .arrow {
            opacity: 1;
        }

        @media (max-width: 600px) {
            h1 { font-size: 4rem; }
            .tagline { font-size: 1.2rem; }
            a { font-size: 1.2rem; }
        }
        
        footer {
            margin-top: 50px;
            color: #555;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="fire-background"></div>
    <div class="pixel-grid"></div>

    <div class="container">
        <header>
            <h1 title="MasKazakh">MasKazakh</h1>
            
            <p class="tagline">IDK what to type here</p>
        </header>

        <nav>
            <ul>
                <li>
                    <a href="https://www.instagram.com/maskazakh/" target="_blank">
                        <span>[INSTAGRAM]</span>
                        <span class="arrow"><</span>
                    </a>
                </li>
                <li>
                    <a href="https://www.roblox.com/users/1906544089/profile" target="_blank">
                        <span>[ROBLOX]</span>
                        <span class="arrow"><</span>
                    </a>
                </li>
                <li>
                    <a href="https://www.youtube.com/@MasKazakh" target="_blank">
                        <span>[YOUTUBE]</span>
                        <span class="arrow"><</span>
                    </a>
                </li>
                <li>
                    <a href="https://steamcommunity.com/id/MasKazakh" target="_blank">
                        <span>[STEAM]</span>
                        <span class="arrow"><</span>
                    </a>
                </li>
            </ul>
        </nav>

        <footer>
            PLAYER 1: MASKAZAKH<br>
            PRESS START
        </footer>
    </div>

</body>
</html>
